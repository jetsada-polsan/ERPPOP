name: Deploy ERP

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        options: [staging, production]
        default: staging

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_sqlite, zip
      - run: composer install --prefer-dist --no-interaction
      - run: cp .env.example .env && php artisan key:generate && php artisan test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      - run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
      - name: Upload release
        run: >-
          rsync -az --delete
          --exclude=.git/ --exclude=.env --exclude=.env.* --exclude=vendor/
          --exclude=node_modules/ --exclude=storage/ --exclude=bootstrap/cache/
          --exclude=database/database.sqlite
          ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ vars.APP_DIR }}/"
      - run: ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "APP_DIR='${{ vars.APP_DIR }}' SKIP_GIT=1 bash '${{ vars.APP_DIR }}/scripts/deploy.sh'"
